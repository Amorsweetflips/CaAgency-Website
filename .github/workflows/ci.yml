name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  # Prisma needs DATABASE_URL at generate time (dummy for CI)
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
  PRISMA_DATABASE_URL: "prisma+postgres://accelerate.prisma-data.net/?api_key=dummy"

jobs:
  lint:
    name: Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Vitest
        run: npm run test:unit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

  # NOTE: E2E (npm run test:e2e) is intentionally not in CI — it renders
  # DB-backed pages, so it needs a real/seeded database (the CI Prisma URL is a
  # dummy). Run it locally, or add a job here once a test-DB secret is wired up.

  notify:
    name: Notify Vercel
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    permissions:
      statuses: write
    steps:
      - name: Notify Vercel - lint
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - ca-agency-website: lint"

      - name: Notify Vercel - build
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - ca-agency-website: build"
