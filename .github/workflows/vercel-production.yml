# Deterministic production deploys for caagency.com.
#
# Since ~2026-07-13 the Vercel GitHub integration stopped creating deployments
# for pushes to master on both linked projects (branch pushes still build
# previews; project settings verified correct: productionBranch=master,
# createDeployments=enabled). Until the native event path is fixed, this
# workflow triggers both projects' master deploy hooks on every push to
# master, restoring automatic production deploys. If the native integration
# recovers, the worst case is a redundant duplicate build.
#
# Hook URLs live in repo secrets; rotate them from each Vercel project's
# Settings → Git → Deploy Hooks if they ever leak.
name: Vercel production deploy

on:
  push:
    branches: [master]

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production deploy hooks
        env:
          HOOK_CA_AGENCY_WEBSITE: ${{ secrets.VERCEL_DEPLOY_HOOK_CA_AGENCY_WEBSITE }}
          HOOK_CAAGENCY: ${{ secrets.VERCEL_DEPLOY_HOOK_CAAGENCY }}
        run: |
          set -euo pipefail
          for name in HOOK_CA_AGENCY_WEBSITE HOOK_CAAGENCY; do
            hook="${!name}"
            if [ -z "$hook" ]; then
              echo "::error::secret for $name is empty"
              exit 1
            fi
            curl -sf --max-time 30 -X POST "$hook" > /dev/null
            echo "triggered $name"
          done
